# ============================================================
# Askme - Global Configuration
# ============================================================
# Use ${ENV_VAR} syntax for secrets (resolved from .env at runtime).
# Defaults are provided for non-secret values.

app:
  name: askme
  version: "4.0.0"
  data_dir: data
  log_level: INFO
  log_file: dev-loop-main.log

# ----------------------------------------------------------
# Brain: LLM / Reasoning
# ----------------------------------------------------------
brain:
  api_key: ${LLM_API_KEY}
  base_url: ${LLM_BASE_URL}
  model: claude-opus-4-6
  # Lightweight model for real-time voice turns (lower TTFT)
  voice_model: MiniMax-M2.5-highspeed
  # Max tokens for a single completion (0 = model default)
  max_tokens: 0
  temperature: 0.7
  # Resilience: timeout, retry, model fallback
  timeout: 30.0
  max_retries: 2
  fallback_models:
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
  # MiniMax LLM (OpenAI-compatible, 100 tps)
  minimax_api_key: ${MINIMAX_API_KEY}
  minimax_base_url: https://api.minimax.chat/v1
  minimax_model: MiniMax-M2.5-highspeed
  # Character definition file (overrides prompt_seed when present)
  soul_file: SOUL.md
  # System prompt template (relay may override, SOUL.md compensates via seed)
  system_prompt: "工业巡检机器人Thunder。中文口语，简洁汇报，80字以内。"
  # Prompt seed: fallback when SOUL.md is absent
  prompt_seed:
    - role: user
      content: "你是Thunder，穹沛科技的工业巡检机器人，用中文简洁回答"
    - role: assistant
      content: "收到。我是Thunder，穹沛的巡检机器人。等待指令。"
  # Format tag prepended to each user message for TTS output control
  user_prefix: "[工业巡检模式：中文口语，80字以内，简洁汇报式，不用markdown，不说英文]"

# ----------------------------------------------------------
# Memory: MemU / Embedding
# ----------------------------------------------------------
memory:
  # Requires local embedding server (python -m memu.embed_server)
  # Set true when embed server is running, false for standalone mode
  enabled: false
  embed_url: ${LOCAL_EMBED_URL}
  embed_model: Qwen/Qwen3-Embedding-0.6B
  # Timeout (seconds) for embedding server reachability check
  health_check_timeout: 1
  # Timeout (seconds) for retrieval calls
  retrieve_timeout: 3.0
  retrieve_method: rag
  user_id: user_1
  episodic:
    importance_threshold: 5.0
    reflect_min_events: 5
    reflect_cooldown_seconds: 300
    flush_threshold: 100
    episode_retention_hours: 24
    knowledge_context_chars: 1000
    digest_context_chars: 600
    relevant_context_chars: 600
    relevant_top_k: 5

# ----------------------------------------------------------
# Conversation History
# ----------------------------------------------------------
conversation:
  history_file: data/conversation_history.json
  max_history: 40

# ----------------------------------------------------------
# Voice: ASR / VAD / KWS / TTS
# ----------------------------------------------------------
voice:
  asr:
    # 2025-06 model: much better accuracy than 2023-02 bilingual
    model_dir: models/asr/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30
    sample_rate: 16000
    feature_dim: 80
    num_threads: 2
    # Endpoint detection silence thresholds (seconds)
    # rule1: long silence after short utterance, rule2: normal speech
    rule1_min_trailing_silence: 1.6
    rule2_min_trailing_silence: 0.8
    # Timeout (seconds) for ASR after wake word detection
    asr_timeout: 10.0

  vad:
    model_path: models/vad/silero_vad.onnx
    # Raised from 0.5 to reduce false positives in noisy environments
    threshold: 0.6
    min_silence_duration: 0.5
    # Raised from 0.25 to filter out noise blips
    min_speech_duration: 0.4
    sample_rate: 16000
    buffer_size_seconds: 30

  # Echo gate: suppress mic during TTS playback when peak < threshold
  # Enables barge-in (user can interrupt) while blocking speaker echo
  # Speaker echo ~50-500, user speech ~800+. Set 0 to disable.
  echo_gate_peak: 800

  punctuation:
    # CT-Transformer: adds punctuation to raw ASR output for better TTS
    model_path: models/punct/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8/model.int8.onnx
    num_threads: 2

  kws:
    model_dir: models/kws/sherpa-onnx-kws-zipformer-wenetspeech-3.3M-2024-01-01
    num_threads: 1
    # Wake words (must be Chinese for wenetspeech model)
    # Set empty to disable KWS (always-on listening mode for testing)
    keywords: []

  tts:
    # Backend: "local" | "edge" | "minimax"
    # "local"   = sherpa-onnx, 低延迟，离线，声音固定
    # "edge"    = Microsoft Edge TTS, 需要网络，声音丰富
    # "minimax" = MiniMax SSE流式, 低延迟, 支持语音克隆/情绪调节
    backend: minimax
    # Local backend settings (MeloTTS: 44100Hz, natural Chinese)
    model_dir: models/tts/vits-melo-tts-zh_en
    num_threads: 4
    speed: 1.0
    sid: 0   # speaker ID (this model has 1 speaker only)
    # Edge backend settings — 切换 backend: edge 后生效
    # 中文男声: zh-CN-YunxiNeural (活泼), zh-CN-YunjianNeural (沉稳)
    # 中文女声: zh-CN-XiaoxiaoNeural (温柔), zh-CN-XiaoyiNeural (活力)
    # 英文男声: en-US-GuyNeural, en-US-AndrewNeural
    # 完整列表: edge-tts --list-voices
    voice: zh-CN-YunjianNeural
    rate: "+0%"
    # MiniMax backend settings — 切换 backend: minimax 后生效
    # SSE流式传输，低延迟，增量播放（不等完整音频）
    minimax_api_key: ${MINIMAX_API_KEY}
    minimax_tts_url: https://api.minimax.chat/v1
    minimax_tts_model: speech-2.8-turbo
    minimax_voice_id: male-qn-qingse
    minimax_sample_rate: 24000
    # Voice tuning (MiniMax)
    # speed: 0.5-2.0 (default 1.0), vol: 0-10 (default 1.0), pitch: -12 to 12 semitones (default 0)
    minimax_speed: 1.0
    minimax_vol: 1.0
    minimax_pitch: 0
    # emotion: "" (auto), happy, sad, angry, fearful, disgusted, surprised, calm
    minimax_emotion: ""
    # Voice cloning: run `python scripts/clone_voice.py <audio> --voice-id <id>`
    # then set minimax_voice_id to the cloned voice_id above.
    # Cloned voice expires in 7 days if not used in any T2A call.
    # Common
    sample_rate: 44100
    # Output device index (see startup log for available devices)
    # null = system default, or set to device index number e.g. 3
    output_device: null

# ----------------------------------------------------------
# Vision: qp-perception (YOLO detection + tracking)
# ----------------------------------------------------------
vision:
  enabled: false
  model_path: models/perception/yolo11n-seg.pt
  confidence_threshold: 0.40
  device: ""
  camera_index: 0
  # VLM fallback (Claude Sonnet for scene understanding)
  vlm_enabled: false
  vlm_api_key: ${LLM_API_KEY}
  vlm_model: claude-haiku-4-5-20251001

# ----------------------------------------------------------
# Robot: Mechanical arm control
# ----------------------------------------------------------
robot:
  enabled: false
  policy_model_path: models/policy/policy_pose0111.onnx
  obs_dim: 285
  action_dim: 16
  serial_port: COM3
  serial_baudrate: 115200
  # simulate: true → no real hardware, for testing
  simulate: true

# ----------------------------------------------------------
# Tools: local execution safety and timeout policy
# ----------------------------------------------------------
tools:
  # Set true to exclude dev-only tools (e.g. run_command) in production deployments
  production_mode: false
  general_chat_max_safety_level: normal
  default_timeout: 8.0
  dangerous_timeout: 8.0
  critical_timeout: 4.0
  timeout_cooldown: 30.0
  approval_timeout_seconds: 30.0
  require_confirmation_levels:
    - dangerous
    - critical
  confirmation_bypass_tools:
    - robot_emergency_stop
  confirmation_phrases:
    - "确认执行"
    - "继续执行"
    - "批准执行"
    - "approve"
    - "confirm"
  rejection_phrases:
    - "取消"
    - "取消执行"
    - "放弃"
    - "cancel"
    - "deny"

# ----------------------------------------------------------
# Proactive: Autonomous patrol and anomaly detection
# ----------------------------------------------------------
proactive:
  enabled: false
  # Seconds between patrol scans
  patrol_interval: 60
  # Min seconds between TTS alerts (avoid spamming)
  alert_cooldown: 30
  # Model for anomaly judgment (fast, cheap)
  judge_model: claude-haiku-4-5-20251001
  # Sensitivity: low (danger only) / medium (notable changes) / high (all changes)
  sensitivity: medium
  # How many past scenes to keep for comparison
  scene_history_size: 5
  # Periodic auto-tasks (optional)
  auto_tasks: []
  #   - name: "环境播报"
  #     interval: 300
  #     prompt: "用一句话描述当前环境状况"

# ----------------------------------------------------------
# Platforms: Multi-platform support (future)
# ----------------------------------------------------------
platforms:
  terminal:
    enabled: true
  wechat:
    enabled: false
  web:
    enabled: false

# ----------------------------------------------------------
# Scheduler: Timed tasks (future)
# ----------------------------------------------------------
scheduler:
  enabled: false
  jobs: []

# ----------------------------------------------------------
# Swarm: Multi-agent collaboration (future)
# ----------------------------------------------------------
swarm:
  enabled: false
  agents: []

# ----------------------------------------------------------
# OTA: Remote registration, heartbeat, and telemetry
# ----------------------------------------------------------
ota:
  enabled: false
  server_url: ${OTA_SERVER_URL}
  channel: stable
  package_name: askme
  serial_number: ${NOVA_DOG_SERIAL_NUMBER}
  heartbeat_interval: 60
  telemetry_interval: 60
  registration_retry_interval: 30
  timeout: 10.0
  state_file: data/ota_bridge_state.json
  device:
    product: inovxio-dog
    tags:
      - thunder
      - askme
      - edge-ai
    serial_number: ""
    robot_id: ""
    site_id: ""

# ----------------------------------------------------------
# Health server: HTTP probes for OTA and local diagnostics
# ----------------------------------------------------------
health_server:
  enabled: true
  host: 0.0.0.0
  port: 8765

# ----------------------------------------------------------
# Runtime: NOVA Dog runtime bridge
# ----------------------------------------------------------
runtime:
  voice_bridge:
    # Requires askme-edge-service running locally
    # Set true when connected to NOVA Dog runtime stack
    enabled: false
    text_enabled: false
    base_url: ${ASKME_EDGE_SERVICE_URL}
    api_key: ${NOVA_DOG_RUNTIME_API_KEY}
    operator_id: askme.voice
    session_id: askme-local-voice
    channel: voice
    text_session_id: askme-local-text
    text_channel: text
    robot_id: ""
    site_id: ""
    submit: true
    timeout: 2.0
    failure_threshold: 2
    failure_cooldown: 15.0

  dog_safety:
    # dog-safety-service E-STOP notification (Thunder runtime integration)
    # Set DOG_SAFETY_SERVICE_URL env var to enable, e.g. http://localhost:5070
    base_url: ${DOG_SAFETY_SERVICE_URL}
    bearer_token: ${RUNTIME_BEARER_TOKEN}
    operator_id: askme
