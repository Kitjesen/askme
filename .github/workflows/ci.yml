name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install "ruff>=0.3.0"
      - name: Ruff check
        run: ruff check askme/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install system libs for sounddevice/soundfile
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libsndfile1
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download silero_vad.onnx for VAD-dependent tests
        run: |
          mkdir -p models/vad
          curl -sSL --retry 3 -o models/vad/silero_vad.onnx \
            https://github.com/snakers4/silero-vad/raw/master/src/silero_vad/data/silero_vad.onnx
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short --maxfail=10 --durations=20
